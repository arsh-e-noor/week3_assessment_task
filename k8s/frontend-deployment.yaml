apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog-client
  template:
    metadata:
      labels:
        app: blog-client
    spec:
      containers:
        - name: blog-client
          image: arshen00r/blog-client:v1
          ports:
            - containerPort: 80